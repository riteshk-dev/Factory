<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Worker Salary & Production Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      padding: 20px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 450px;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #0056b3;
    }
    .output {
      margin-top: 20px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    .output p {
      margin: 6px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Salary & Production Calculator</h2>
    
    <label>Worker Name:</label>
    <input type="text" id="workerName" placeholder="Enter worker name">

    <label>Worker Salary (per month):</label>
    <input type="number" id="workerSalary" placeholder="Enter monthly salary">

    <label>Production in 12 hours:</label>
    <input type="number" id="production" placeholder="Enter production units">

    <label>Calculate for hours:</label>
    <input type="number" id="hours" placeholder="Enter hours">

    <button onclick="calculate()">Calculate</button>
    <button onclick="addWorker()">+ Add Worker</button>
    <button onclick="downloadPDF()">Download PDF</button>

    <div class="output" id="output"></div>
  </div>

  <script>
    let allResults = []; // store multiple workers' data

    function calculate() {
      const workerName = document.getElementById('workerName').value;
      const workerSalary = parseInt(document.getElementById('workerSalary').value);
      const production12 = parseInt(document.getElementById('production').value);
      const a = parseInt(document.getElementById('hours').value);

      if (!workerName || isNaN(workerSalary) || isNaN(production12) || isNaN(a)) {
        document.getElementById('output').innerHTML = "<p>Please fill all fields correctly.</p>";
        return;
      }

      const daily_salary = workerSalary / 30;
      const hourly_salary = daily_salary / 8;
      const production_per_hour = production12 / 12;
      const cost_per_rupees = production_per_hour / hourly_salary;
      const production_in_a_hours = production_per_hour * a;

      const result = `
        Worker Name: ${workerName}\n
        Worker Salary (per month): ${workerSalary}\n
        Production in 12 Hours: ${production12}\n
        Salary in One Day (8 hrs): ${daily_salary}\n
        Salary in One Hour: ${hourly_salary}\n
        Production in One Hour: ${production_per_hour}\n
        No. of Pieces in 1 Rupee: ${cost_per_rupees}\n
        Production in ${a} hours: ${production_in_a_hours}
      `;

      document.getElementById('output').innerHTML = result.replace(/\n/g, "<br>");
      return result;
    }

    function addWorker() {
      const result = calculate();
      if (result) {
        allResults.push(result);
        alert("Worker data added successfully!");
        // Clear inputs for next entry
        document.getElementById('workerName').value = "";
        document.getElementById('workerSalary').value = "";
        document.getElementById('production').value = "";
        document.getElementById('hours').value = "";
        document.getElementById('output').innerHTML = "";
      }
    }

    function downloadPDF() {
      if (allResults.length === 0) {
        alert("Please add at least one worker before downloading PDF.");
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(14);
      doc.text("Worker Salary & Production Report", 10, 10);
      doc.setFontSize(12);

      let y = 20;
      allResults.forEach((res, index) => {
        doc.text(`--- Worker ${index+1} ---`, 10, y);
        y += 10;
        res.split("\n").forEach(line => {
          if (line.trim() !== "") {
            doc.text(line.trim(), 10, y);
            y += 8;
          }
        });
        y += 10;
      });

      doc.save("worker_report.pdf");
    }
  </script>
</body>
</html>
